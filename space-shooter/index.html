  getDocs
} from "https://www.gstatic.com/firebasejs/11.9.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBCd8A_BCz66vJPwA-fvUzUdMszw1rUumg",

  projectId: "leaderboard-a256a",

  messagingSenderId: "270594115926",
  appId: "1:270594115926:web:95568fcbec9623649eeef7",
  measurementId: "G-4CE49MCVY7"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.uploadScore = async function(playerName, score)
{
    try
    {
        await addDoc(collection(db, "scores"), {
            name: playerName,
            score: Number(score),
            timestamp: Date.now()
        });

        console.log("Score uploaded!");
    }
    catch(error)
    {
        console.error("Upload failed:", error);
    }
};

window.loadLeaderboard = async function()
{
    try
    {
        const q = query(
            collection(db, "scores"),
            orderBy("score", "desc"),
            limit(10)
        );

        const snapshot = await getDocs(q);

        let results = [];

        snapshot.forEach((doc) => {
            results.push(doc.data());
        });

        console.log("Leaderboard:", results);

        return JSON.stringify(results);
    }
    catch(error)
    {
        console.error(error);
        return "[]";
    }
};
</script>
